<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness Realtors | Forgot Password</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="brand-bar">
      <div class="brand-wrap">
        <div class="brand-logo brand-mark" aria-hidden="true">FR</div>
        <div class="brand-text">Fitness Realtors</div>
      </div>
    </header>

    <!-- Forgot Password Section -->
    <section id="forgot-section" class="section">
      <!-- Animated background -->
      <div class="animated-background"></div>
      <main class="login-stage">
        <section class="forgot-password-card">
          <h2>Reset Your Password</h2>
          <p>Enter your email address and we'll send you a link to reset your password.</p>
          <form id="forgot-form" class="forgot-form">
            <label for="reset-email">Email Address</label>
            <div class="field-wrap">
              <span class="field-icon" aria-hidden="true">@</span>
              <input id="reset-email" type="email" name="resetEmail" placeholder="Enter your email" required />
            </div>
            <button type="submit" class="reset-btn">Send Reset Link</button>
            <button type="button" id="back-to-login" class="back-btn">Back to Login</button>
          </form>
          <div id="reset-feedback" class="reset-feedback" hidden>
            <p id="reset-feedback-message" class="reset-feedback-message"></p>
            <a id="reset-link" class="reset-link" href="#" hidden>Open reset page</a>
          </div>
        </section>
      </main>
    </section>

    <script src="auth.js"></script>
    <script>
      // Forgot Password form logic for forgot.html
      document.addEventListener('DOMContentLoaded', function () {
        const forgotForm = document.getElementById('forgot-form');
        const resetEmail = document.getElementById('reset-email');
        const backToLoginBtn = document.getElementById('back-to-login');
        const resetFeedback = document.getElementById('reset-feedback');
        const resetFeedbackMessage = document.getElementById('reset-feedback-message');
        const resetLink = document.getElementById('reset-link');

        // Back to login
        backToLoginBtn?.addEventListener('click', () => {
          window.location.href = 'index.html';
        });

        // Forgot Password form submission
        if (forgotForm && resetEmail) {
          forgotForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const emailValue = resetEmail.value.trim();
            const isValidEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue);

            if (!isValidEmail) {
              alert('Please enter a valid email address.');
              return;
            }

            try {
              const data = await FitnessRealtorsAuth.forgotPassword({ email: emailValue });

              if (data.success) {
                if (resetFeedback && resetFeedbackMessage) {
                  resetFeedback.hidden = false;
                  resetFeedbackMessage.textContent =
                    data.emailSent === false
                      ? 'Email sending is not configured yet. Use the reset link below.'
                      : data.message || 'Password reset link sent to your email!';
                }
                if (resetLink && data.resetLink && data.emailSent === false) {
                  resetLink.href = data.resetLink;
                  resetLink.hidden = false;
                } else if (resetLink) {
                  resetLink.hidden = true;
                }
                resetEmail.value = '';
              } else {
                alert(data.message || 'Unable to process that email address.');
              }
            } catch (err) {
              alert('An error occurred. Please try again.');
            }
          });
        }
      });
    </script>
  </body>
</html>
